name: CI - MiKompri ShoppingList

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'hotfix/*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MiKompri.sln

      - name: Build
        run: dotnet build MiKompri.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MiKompri.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test   

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Compose up (API + Postgres)
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for API health
        run: |
          echo "Waiting for API to become healthy..."
          for i in {1..15}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt $i/15: API not ready yet, waiting 5s..."
            sleep 5
          done
          echo "API did not become healthy in time "
          docker compose -f docker-compose.yml logs
          exit 1

      - name: Docker Compose down
        if: always()
        run: docker compose -f docker-compose.yml down

