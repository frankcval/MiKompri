name: CI - MiKompri Users

on:
  push:
    branches:
      - main
      - 003-users-authentication
  pull_request:
    branches:
      - main
      - 003-users-authentication

jobs:
  build-test-and-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MiKompri.sln

      - name: Build
        run: dotnet build MiKompri.sln --configuration Release --no-restore

      - name: Test Users.Domain
        run: dotnet test test/MiKompri.Users.Domain.Tests/MiKompri.Users.Domain.Tests.csproj --configuration Release --no-build

      - name: Test Users.Application
        run: dotnet test test/MiKompri.Users.Application.Tests/MiKompri.Users.Application.Tests.csproj --configuration Release --no-build

      - name: Test Users.Api
        run: dotnet test test/MiKompri.Users.Api.Tests/MiKompri.Users.Api.Tests.csproj --configuration Release --no-build

      - name: Docker build Users API (TP4)
        run: docker build -t mikompri.users.api -f MiKompri.Users.Api/Dockerfile .
