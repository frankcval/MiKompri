version: '3.9'

services:
  mikomprishoppinglistapi:
    image: mikompri.shoppinglist.api
    build:
      context: .
      dockerfile: MiKompri.ShoppingList.Api/Dockerfile
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mikompriusersapi:
    image: mikompri.users.api
    build:
      context: .
      dockerfile: MiKompri.Users.Api/Dockerfile
    depends_on:
      - postgres
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15
    container_name: mikompri_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: MiKompri_ShoppingList
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-users-db.sql:/docker-entrypoint-initdb.d/02-init-users-db.sql
    restart: unless-stopped

volumes:
  postgres_data:
